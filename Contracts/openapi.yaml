openapi: 3.1.0
info:
  title: AI_RE Backend API
  version: 0.1.0
  description: Contract-first API for the A PC, B WebApp, and C Backend topology.
servers:
  - url: http://localhost:8000
    description: Local mock Backend
paths:
  /health:
    get:
      operationId: getHealth
      tags: [System]
      responses:
        "200":
          description: Backend process is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/system/capabilities:
    get:
      operationId: getCapabilities
      tags: [System]
      responses:
        "200":
          description: Features exposed by the current Backend mode.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
  /api/v1/chat:
    post:
      operationId: createChatResponse
      tags: [Chat]
      security:
        - DeviceBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/chat-request.schema.json"
      responses:
        "200":
          description: Normalized dialogue and optional untrusted candidates.
          content:
            application/json:
              schema:
                $ref: "./schemas/chat-response.schema.json"
        "400":
          $ref: "#/components/responses/ContractError"
        "401":
          $ref: "#/components/responses/ContractError"
        "503":
          $ref: "#/components/responses/ContractError"
  /api/v1/events:
    post:
      operationId: recordGameEvent
      tags: [Events]
      security:
        - DeviceBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/event.schema.json"
      responses:
        "202":
          description: Event accepted. Repeated event IDs are idempotent.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [schema_version, request_id, event_id, status]
                properties:
                  schema_version:
                    type: integer
                    const: 1
                  request_id:
                    type: string
                  event_id:
                    type: string
                  status:
                    type: string
                    enum: [Accepted, Duplicate]
        "400":
          $ref: "#/components/responses/ContractError"
        "401":
          $ref: "#/components/responses/ContractError"
components:
  securitySchemes:
    DeviceBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque-device-token
      description: >-
        C resolves Profile, Device, and Device role from this token. M01 uses
        local environment-only development tokens; M02 replaces them with
        pairing-issued tokens whose raw values are not stored by the Backend.
  responses:
    ContractError:
      description: Stable error envelope.
      content:
        application/json:
          schema:
            $ref: "./schemas/error-envelope.schema.json"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [service, status, schema_version, ai_mode]
      properties:
        service:
          type: string
          const: aire-backend
        status:
          type: string
          const: ok
        schema_version:
          type: integer
          const: 1
        ai_mode:
          type: string
          enum: [mock, local]
    CapabilitiesResponse:
      type: object
      additionalProperties: false
      required: [schema_version, ai_mode, capabilities]
      properties:
        schema_version:
          type: integer
          const: 1
        ai_mode:
          type: string
          enum: [mock, local]
        capabilities:
          type: array
          uniqueItems: true
          items:
            type: string
